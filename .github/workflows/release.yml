name: Release FixLang

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

concurrency:
  group: fixlang-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      should_publish: ${{ steps.resolve.outputs.should_publish }}
    steps:
      - name: Check out release history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release version and tag
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          stable_version_pattern='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          package_version="$(node -p "require('./package.json').version")"
          if ! [[ "${package_version}" =~ ${stable_version_pattern} ]]; then
            echo "package.json version must be a stable semantic version (for example, 0.3.0)." >&2
            exit 1
          fi
          if ! node -e '
            const version = process.argv[1];
            const components = version.split(".").map(Number);
            process.exit(components.every(Number.isSafeInteger) ? 0 : 1);
          ' "${package_version}"; then
            echo "package.json version components must be safe integers." >&2
            exit 1
          fi

          release_tag="v${package_version}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          git fetch --no-tags origin main:refs/remotes/origin/main

          latest_public_version() {
            gh api --paginate --slurp "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              | node -e '
                let input = "";
                process.stdin.on("data", (chunk) => (input += chunk));
                process.stdin.on("end", () => {
                  const releases = JSON.parse(input).flat();
                  const versions = releases
                    .filter((release) => !release.draft && !release.prerelease)
                    .map((release) => release.tag_name)
                    .map((tag) => {
                      const match = /^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$/.exec(tag);
                      if (!match) return null;

                      const parts = match.slice(1).map(Number);
                      if (!parts.every(Number.isSafeInteger)) return null;

                      return { raw: tag.slice(1), parts: parts.map(BigInt) };
                    })
                    .filter((version) => version !== null);
                  versions.sort((left, right) => {
                    for (let index = 0; index < 3; index += 1) {
                      if (left.parts[index] !== right.parts[index]) {
                        return left.parts[index] < right.parts[index] ? -1 : 1;
                      }
                    }
                    return 0;
                  });
                  if (versions.length > 0) console.log(versions.at(-1).raw);
                });
              '
          }

          version_is_greater_than() {
            node -e '
              const [candidate, current] = process.argv.slice(1);
              const candidateParts = candidate.split(".").map(BigInt);
              const currentParts = current.split(".").map(BigInt);
              for (let index = 0; index < 3; index += 1) {
                if (candidateParts[index] !== currentParts[index]) {
                  process.exit(candidateParts[index] > currentParts[index] ? 0 : 1);
                }
              }
              process.exit(1);
            ' "${1}" "${2}"
          }

          release_is_public() {
            local tag="$1"
            local is_draft
            if is_draft="$(gh release view "${tag}" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
              [ "${is_draft}" != "true" ]
            else
              return 1
            fi
          }

          ensure_monotonic_version() {
            local latest_version
            latest_version="$(latest_public_version)"
            if [ -n "${latest_version}" ] && ! version_is_greater_than "${package_version}" "${latest_version}"; then
              echo "Package version ${package_version} must be greater than the latest public stable release ${latest_version}." >&2
              exit 1
            fi
          }

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            if [ "${GITHUB_REF_NAME}" != "${release_tag}" ]; then
              echo "Release tag ${GITHUB_REF_NAME} must match ${release_tag}." >&2
              exit 1
            fi

            tag_commit="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
            if ! git merge-base --is-ancestor "${tag_commit}" refs/remotes/origin/main; then
              echo "Release tag ${GITHUB_REF_NAME} must point to a commit on main." >&2
              exit 1
            fi

            if release_is_public "${release_tag}"; then
              echo "Version ${package_version} already has a public release; skipping publication."
              echo "should_publish=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            ensure_monotonic_version
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git show-ref --verify --quiet "refs/tags/${release_tag}"; then
            tag_commit="$(git rev-parse "${release_tag}^{commit}")"
            if ! git merge-base --is-ancestor "${tag_commit}" "${GITHUB_SHA}"; then
              echo "Existing tag ${release_tag} is not part of the pushed main history; refusing to move it." >&2
              exit 1
            fi

            tagged_version="$(git show "${tag_commit}:package.json" | node -e 'let input=""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => console.log(JSON.parse(input).version));')"
            if [ "${tagged_version}" != "${package_version}" ]; then
              echo "Existing tag ${release_tag} contains package version ${tagged_version}; refusing to reuse it." >&2
              exit 1
            fi

            if release_is_public "${release_tag}"; then
              echo "Version ${package_version} already has a public release; skipping publication."
              echo "should_publish=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi

            ensure_monotonic_version
            echo "Version ${package_version} is tagged but has no completed release; resuming publication."
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          ensure_monotonic_version
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${release_tag}" \
            -f "sha=${GITHUB_SHA}" >/dev/null
          echo "Created ${release_tag} at ${GITHUB_SHA}."
          echo "should_publish=true" >> "${GITHUB_OUTPUT}"

  release:
    name: Build and publish unsigned macOS release
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: macos-14
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          expected_tag="v${package_version}"
          if [ "${RELEASE_TAG}" != "${expected_tag}" ]; then
            echo "Release tag ${RELEASE_TAG} must match ${expected_tag}." >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build renderer and processes
        run: bun run build

      - name: Build unsigned arm64 DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: bunx electron-builder --mac --arm64 --publish never

      - name: Validate unsigned arm64 artifacts
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          artifact_name="FixLang-${package_version}-arm64.dmg"
          artifact_path="release/${artifact_name}"
          test -s "release/FixLang-${package_version}-arm64.dmg"
          hdiutil verify "release/FixLang-${package_version}-arm64.dmg"

          mount_path="$(mktemp -d)"
          cleanup() {
            hdiutil detach "${mount_path}" -quiet >/dev/null 2>&1 || true
            rmdir "${mount_path}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          hdiutil attach "${artifact_path}" -nobrowse -readonly -noverify -mountpoint "${mount_path}" >/dev/null
          app_version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "${mount_path}/FixLang.app/Contents/Info.plist")"
          if [ "${app_version}" != "${package_version}" ]; then
            echo "DMG contains FixLang ${app_version}, expected ${package_version}." >&2
            exit 1
          fi

          (
            cd release
            shasum -a 256 "${artifact_name}" > SHA256SUMS.txt
          )
          test -s release/SHA256SUMS.txt
          grep -Fq "${artifact_name}" release/SHA256SUMS.txt

      - name: Create or resume draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if release_is_draft="$(gh release view "${RELEASE_TAG}" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "${release_is_draft}" != "true" ]; then
              echo "Release ${RELEASE_TAG} is already public; refusing to replace its assets." >&2
              exit 1
            fi
          else
            gh release create "${RELEASE_TAG}" \
              --draft \
              --generate-notes \
              --title "FixLang ${RELEASE_TAG}"
          fi

      - name: Upload validated release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          package_version="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          artifact_name="FixLang-${package_version}-arm64.dmg"
          remote_assets="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')"
          expected_count=0
          for expected_asset in "${artifact_name}" SHA256SUMS.txt; do
            if grep -Fxq "${expected_asset}" <<< "${remote_assets}"; then
              expected_count=$((expected_count + 1))
            fi
          done

          if [ "${expected_count}" -eq 0 ]; then
            gh release upload "${RELEASE_TAG}" \
              "release/FixLang-${package_version}-arm64.dmg" \
              release/SHA256SUMS.txt
          elif [ "${expected_count}" -eq 2 ]; then
            echo "Draft ${RELEASE_TAG} already has the validated immutable assets; resuming publication."
          else
            echo "Draft ${RELEASE_TAG} has a partial immutable asset set; delete the draft before retrying." >&2
            exit 1
          fi

      - name: Verify uploaded release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          package_version="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          artifact_name="FixLang-${package_version}-arm64.dmg"
          remote_assets="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')"
          remote_asset_count="$(grep -cve '^$' <<< "${remote_assets}")"
          if [ "${remote_asset_count}" -ne 2 ]; then
            echo "Draft release must contain exactly the DMG and SHA256SUMS.txt, found ${remote_asset_count} assets." >&2
            exit 1
          fi

          for expected_asset in "${artifact_name}" SHA256SUMS.txt; do
            if ! grep -Fxq "${expected_asset}" <<< "${remote_assets}"; then
              echo "Draft release is missing ${expected_asset}." >&2
              exit 1
            fi
          done

          download_path="$(mktemp -d)"
          cleanup() {
            rm -rf "${download_path}"
          }
          trap cleanup EXIT
          gh release download "${RELEASE_TAG}" \
            --pattern "${artifact_name}" \
            --pattern SHA256SUMS.txt \
            --dir "${download_path}"
          (
            cd "${download_path}"
            shasum -a 256 -c SHA256SUMS.txt
          )

      - name: Publish completed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${RELEASE_TAG}" --draft=false --latest
