name: Release FixLang

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]

concurrency:
  group: fixlang-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  prepare:
    name: Resolve release version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      should_publish: ${{ steps.resolve.outputs.should_publish }}
    steps:
      - name: Check out release history
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve release version and tag
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          RELEASE_MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          RELEASE_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          RELEASE_APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          RELEASE_APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          RELEASE_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"
          if ! [[ "${package_version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version must be a stable semantic version (for example, 0.3.0)." >&2
            exit 1
          fi

          release_tag="v${package_version}"
          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"
          git fetch --no-tags origin main:refs/remotes/origin/main

          require_release_secrets() {
            local missing=()
            local variable_name
            for variable_name in \
              RELEASE_MAC_CSC_LINK \
              RELEASE_MAC_CSC_KEY_PASSWORD \
              RELEASE_APPLE_API_KEY \
              RELEASE_APPLE_API_KEY_ID \
              RELEASE_APPLE_API_ISSUER \
              RELEASE_APPLE_TEAM_ID; do
              if [ -z "${!variable_name:-}" ]; then
                missing+=("${variable_name#RELEASE_}")
              fi
            done

            if [ "${#missing[@]}" -gt 0 ]; then
              printf 'Missing required release secrets: %s\n' "${missing[*]}" >&2
              exit 1
            fi
          }

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            if [ "${GITHUB_REF_NAME}" != "${release_tag}" ]; then
              echo "Release tag ${GITHUB_REF_NAME} must match ${release_tag}." >&2
              exit 1
            fi

            tag_commit="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
            if ! git merge-base --is-ancestor "${tag_commit}" refs/remotes/origin/main; then
              echo "Release tag ${GITHUB_REF_NAME} must point to a commit on main." >&2
              exit 1
            fi

            require_release_secrets
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if git show-ref --verify --quiet "refs/tags/${release_tag}"; then
            tag_commit="$(git rev-parse "${release_tag}^{commit}")"
            if ! git merge-base --is-ancestor "${tag_commit}" "${GITHUB_SHA}"; then
              echo "Existing tag ${release_tag} is not part of the pushed main history; refusing to move it." >&2
              exit 1
            fi

            tagged_version="$(git show "${tag_commit}:package.json" | node -e 'let input=""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => console.log(JSON.parse(input).version));')"
            if [ "${tagged_version}" != "${package_version}" ]; then
              echo "Existing tag ${release_tag} contains package version ${tagged_version}; refusing to reuse it." >&2
              exit 1
            fi

            if release_is_draft="$(gh release view "${release_tag}" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
              if [ "${release_is_draft}" != "true" ]; then
                echo "Version ${package_version} already has a public release; skipping publication."
                echo "should_publish=false" >> "${GITHUB_OUTPUT}"
                exit 0
              fi
            fi

            echo "Version ${package_version} is tagged but has no completed release; resuming publication."
            require_release_secrets
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          require_release_secrets
          gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${release_tag}" \
            -f "sha=${GITHUB_SHA}" >/dev/null
          echo "Created ${release_tag} at ${GITHUB_SHA}."
          echo "should_publish=true" >> "${GITHUB_OUTPUT}"

  release:
    name: Build, notarize, and publish macOS release
    needs: prepare
    if: needs.prepare.outputs.should_publish == 'true'
    runs-on: macos-14
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
    steps:
      - name: Check out the release tag
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.prepare.outputs.release_tag }}
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          expected_tag="v${package_version}"
          if [ "${RELEASE_TAG}" != "${expected_tag}" ]; then
            echo "Release tag ${RELEASE_TAG} must match ${expected_tag}." >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build renderer and processes
        run: bun run build

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if release_is_draft="$(gh release view "${RELEASE_TAG}" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "${release_is_draft}" != "true" ]; then
              echo "Release ${RELEASE_TAG} is already public; refusing to replace its assets." >&2
              exit 1
            fi
          else
            gh release create "${RELEASE_TAG}" \
              --draft \
              --generate-notes \
              --title "FixLang ${RELEASE_TAG}"
          fi

      - name: Prepare App Store Connect API key
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
        run: |
          key_path="${RUNNER_TEMP}/app-store-connect-api-key.p8"
          printf '%s' "${APPLE_API_KEY_BASE64}" | base64 -D > "${key_path}"
          chmod 600 "${key_path}"

      - name: Build, sign, notarize, and upload arm64 artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/app-store-connect-api-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bunx electron-builder --mac --arm64 --publish always

      - name: Remove App Store Connect API key
        if: always()
        shell: bash
        run: rm -f "${RUNNER_TEMP}/app-store-connect-api-key.p8"

      - name: Verify published update artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          package_version="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          test -f release/latest-mac.yml
          test -f "release/FixLang-${package_version}-arm64.dmg"
          test -f "release/FixLang-${package_version}-arm64.zip"
          codesign --verify --deep --strict --verbose=2 "release/mac-arm64/FixLang.app"
          spctl --assess --verbose=4 --type execute "release/mac-arm64/FixLang.app"
          xcrun stapler validate "release/mac-arm64/FixLang.app"
          remote_assets="$(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')"
          for expected_asset in \
            latest-mac.yml \
            "FixLang-${package_version}-arm64.dmg" \
            "FixLang-${package_version}-arm64.zip"; do
            if ! grep -Fxq "${expected_asset}" <<< "${remote_assets}"; then
              echo "Draft release is missing ${expected_asset}." >&2
              exit 1
            fi
          done

      - name: Publish completed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${RELEASE_TAG}" --draft=false --latest
