name: Release FixLang

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    name: Build, notarize, and publish macOS release
    runs-on: macos-14
    steps:
      - name: Check out the tagged source
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Verify release tag matches package version
        shell: bash
        run: |
          package_version="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          expected_tag="v${package_version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Release tag ${GITHUB_REF_NAME} must match ${expected_tag}." >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build renderer and processes
        run: bun run build

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if release_is_draft="$(gh release view "${GITHUB_REF_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null)"; then
            if [ "${release_is_draft}" != "true" ]; then
              echo "Release ${GITHUB_REF_NAME} is already public; refusing to replace its assets." >&2
              exit 1
            fi
          else
            gh release create "${GITHUB_REF_NAME}" \
              --draft \
              --generate-notes \
              --title "FixLang ${GITHUB_REF_NAME}"
          fi

      - name: Prepare App Store Connect API key
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY }}
        run: |
          key_path="${RUNNER_TEMP}/app-store-connect-api-key.p8"
          printf '%s' "${APPLE_API_KEY_BASE64}" | base64 -D > "${key_path}"
          chmod 600 "${key_path}"

      - name: Build, sign, notarize, and upload arm64 artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/app-store-connect-api-key.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bunx electron-builder --mac --arm64 --publish always

      - name: Remove App Store Connect API key
        if: always()
        shell: bash
        run: rm -f "${RUNNER_TEMP}/app-store-connect-api-key.p8"

      - name: Verify published update artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          package_version="$(bun -e 'console.log((await Bun.file("package.json").json()).version)')"
          test -f release/latest-mac.yml
          test -f "release/FixLang-${package_version}-arm64.dmg"
          test -f "release/FixLang-${package_version}-arm64.zip"
          codesign --verify --deep --strict --verbose=2 "release/mac-arm64/FixLang.app"
          spctl --assess --verbose=4 --type execute "release/mac-arm64/FixLang.app"
          xcrun stapler validate "release/mac-arm64/FixLang.app"
          remote_assets="$(gh release view "${GITHUB_REF_NAME}" --json assets --jq '.assets[].name')"
          for expected_asset in \
            latest-mac.yml \
            "FixLang-${package_version}-arm64.dmg" \
            "FixLang-${package_version}-arm64.zip"; do
            if ! grep -Fxq "${expected_asset}" <<< "${remote_assets}"; then
              echo "Draft release is missing ${expected_asset}." >&2
              exit 1
            fi
          done

      - name: Publish completed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
