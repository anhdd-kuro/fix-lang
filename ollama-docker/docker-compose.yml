version: '3'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    environment:
      - OLLAMA_MODELS=/root/.ollama/models
      - OLLAMA_DEBUG=1
    deploy:
      resources:
        # Optimized for deepseek-r1:7b model
        limits:
          memory: 10G # For running the 7B parameter model
          cpus: 8
        reservations:
          memory: 6G # Minimum for good performance

volumes:
  ollama-data:
    name: ollama-mvp-deepseek-r1 # Use a specific volume name for this MVP